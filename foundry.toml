[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./broadcast" }]
verbosity = 3

[rpc_endpoints]
skale_base_sepolia = "${SKALE_BASE_SEPOLIA_RPC_URL}"

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 100
multiline_func_header = "params_first"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true
