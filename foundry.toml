[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "istanbul"
fs_permissions = [{ access = "read", path = "./broadcast" }]
verbosity = 3
remappings = [
    "@skalenetwork/bite-solidity/=lib/bite-solidity/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
skale_base_sepolia = "${SKALE_BASE_SEPOLIA_RPC_URL}"
bite_v2_sandbox = "${BITE_V2_SANDBOX_RPC_URL:-https://base-sepolia-testnet.skalenodes.com/v1/bite-v2-sandbox}"

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 100
multiline_func_header = "params_first"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true
